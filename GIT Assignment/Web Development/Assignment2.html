<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    table,tr,th,td{
        border: 2px solid black;
        border-collapse: separate;
        
    }
</style>
</head>
<body>
    <table >
        <caption>Assignment 2 - Table</caption>
        <tr>
            <td>Item</td>
            <th>Quantity</th>
            <th>Unit Price</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Penciles</td>
            <td>2</td>
            <td>$1</td>
            <td>$2</td>
        </tr>
        <tr>
            <td>Eraser</td>
            <td>4</td>
            <td rowspan="2">$0.50</td>
            <td>$2</td>
        </tr>
        <tr>
            <td colspan="2">Subtotal</td>
            <td>$4</td>
        </tr>
        <tr>
            <td>Tax</td>
            <td>10%</td>
            <td colspan="2">$0.4</td>
        </tr>
        <tfoot>
            <tr>
                <td colspan="4">Footer Of the Table</td>
            </tr>
        </tfoot>
        
    </table>
</body>
</html>
