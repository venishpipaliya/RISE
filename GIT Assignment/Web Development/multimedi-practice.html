<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia</title>
</head>
<body>
    <h1>Assignment 7 - Multimedia & iframe</h1>

    <h2>Audio Tag</h2>

    <audio controls autoplay loop>
        <source src = "https://commondatastorage.googleapis.com/codeskulptor-demos/DDR_assets/Kangaroo_MusiQue_-_The_Neverwritten_Role_Playing_Game.mp3"
        type="audio/mp3">
    </audio>

    <h2>Video Tag</h2>

    <video controls autoplay muted loop width="500px" height="300px">
        <source src="https://www.pexels.com/download/video/36244254/">
    </video>

    <h2>Iframe tag</h2>
    <h3>First Frame</h3>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/st8RnNg_LLA?si=9vA8SkN-IwKQ6tFl" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h3>Second Frame</h3>
    <iframe src="https://en.wikipedia.org/wiki/C_(programming_language)" frameborder="0"></iframe><br><br>
    <h3>Third Frame</h3>
    <iframe src="Assignment2.html" frameborder="0"></iframe>

 
</body>
</html>
